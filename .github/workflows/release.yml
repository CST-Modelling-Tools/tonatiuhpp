name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      fake_tag:
        description: "Simulated tag (e.g., v0.1.8.16)"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            ifw_platform: linux
          - os: macos-latest
            ifw_platform: macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          tools: "tools_ifw"
          cache: true

      - name: Export Qt prefix (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${Qt6_DIR:-}" ] && [ -d "${Qt6_DIR}" ]; then
            QT_PREFIX="$(cd "${Qt6_DIR}/../../.." && pwd)"
          elif [ -n "${QT_ROOT_DIR:-}" ] && [ -d "${QT_ROOT_DIR:-}" ]; then
            QT_PREFIX="${QT_ROOT_DIR}"
          else
            echo "Qt prefix not found via Qt6_DIR or QT_ROOT_DIR" >&2
            exit 1
          fi

          echo "TONATIUH_QT_ROOT=${QT_PREFIX}" >> "$GITHUB_ENV"
          echo "Qt6_DIR=${QT_PREFIX}/lib/cmake/Qt6" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=${QT_PREFIX}:${CMAKE_PREFIX_PATH:-}" >> "$GITHUB_ENV"

          if [ -d "${QT_PREFIX}/lib/pkgconfig" ]; then
            echo "PKG_CONFIG_PATH=${QT_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> "$GITHUB_ENV"
          fi

          if [ -d "${QT_PREFIX}/lib" ]; then
            echo "LD_LIBRARY_PATH=${QT_PREFIX}/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          fi

      - name: Resolve Qt IFW tool paths
        shell: bash
        run: |
          set -euo pipefail

          repogen="$(command -v repogen || true)"
          if [ -z "${repogen}" ]; then
            repogen="$(find "${RUNNER_TOOL_CACHE:-$HOME}" "$HOME" -type f -path '*/QtInstallerFramework*/bin/repogen' -print -quit 2>/dev/null || true)"
          fi

          if [ -z "${repogen}" ]; then
            echo "repogen not found after installing Qt IFW." >&2
            exit 1
          fi

          echo "REPOGEN_PATH=${repogen}" >> "$GITHUB_ENV"

      - name: Install Python deps (+ Ninja)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml ninja

      - name: Install Boost + Eigen + image codecs (Ubuntu)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libboost-dev \
            libeigen3-dev \
            libsimage-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            pkg-config \
            ninja-build

      - name: Install Boost + Eigen (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install boost eigen

      - name: Cache third-party deps
        uses: actions/cache@v4
        with:
          path: |
            third_party/_install
            third_party/_build
          key: release-deps-${{ runner.os }}-${{ hashFiles(
            'scripts/build_deps.py',
            'cmake/**',
            'source/CMakeLists.txt',
            '.github/workflows/release.yml') }}

      - name: Build third-party dependencies
        shell: bash
        run: |
          mkdir -p third_party/_build third_party/_install
          python scripts/build_deps.py

      - name: Configure + build + install
        shell: bash
        run: |
          cmake -S source -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel
          cmake --install build --prefix dist

      - name: Validate Linux bundled runtime layout
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          test -x dist/bin/tonatiuhpp
          test -x dist/bin/tonatiuhpp-bin
          test -f dist/bin/qt.conf
          test -d dist/bin/platforms
          test -f dist/lib/libQt6Core.so.6

          if ldd dist/bin/tonatiuhpp-bin | grep -E '/usr/.*/libQt6'; then
            echo "Main Linux binary resolves Qt from the system instead of dist/lib." >&2
            exit 1
          fi

          find dist/bin/platforms -maxdepth 1 -type f -name '*.so*' -print0 | while IFS= read -r -d '' plugin; do
            if ldd "${plugin}" | grep -E '/usr/.*/libQt6'; then
              echo "Qt platform plugin resolves Qt from the system: ${plugin}" >&2
              exit 1
            fi
          done

      - name: Deploy Qt frameworks (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          APP_BUNDLE="$(find dist -type d -name '*.app' -print -quit)"
          if [ -z "${APP_BUNDLE}" ]; then
            echo "No .app bundle found in dist after install" >&2
            exit 1
          fi

          echo "Using app bundle: ${APP_BUNDLE}"
          macdeployqt "${APP_BUNDLE}" -verbose=1

          APP_EXEC="$(find "${APP_BUNDLE}/Contents/MacOS" -type f -perm -111 -print -quit)"
          if [ -z "${APP_EXEC}" ]; then
            echo "No executable found inside app bundle: ${APP_BUNDLE}" >&2
            exit 1
          fi

          FRAMEWORKS_DIR="${APP_BUNDLE}/Contents/Frameworks"
          MACOS_DIR="${APP_BUNDLE}/Contents/MacOS"
          APP_RESOURCES_DIR="${APP_BUNDLE}/Contents/Resources"
          APP_PLUGINS_DIR="${MACOS_DIR}/plugins"
          mkdir -p "${FRAMEWORKS_DIR}"
          mkdir -p "${APP_RESOURCES_DIR}"
          mkdir -p "${APP_PLUGINS_DIR}"

          PRIVATE_DYLIBS=()
          while IFS= read -r dylib; do
            [ -n "${dylib}" ] || continue
            PRIVATE_DYLIBS+=("${dylib}")
          done < <(
            otool -L "${APP_EXEC}" | tail -n +2 | awk '{print $1}' | while read -r dep; do
              base="$(basename "${dep}")"
              if [[ "${base}" == libTonatiuh*.dylib && -f "dist/bin/${base}" ]]; then
                echo "${base}"
              fi
            done | sort -u
          )

          if [ "${#PRIVATE_DYLIBS[@]}" -eq 0 ]; then
            echo "No Tonatiuh private dylibs referenced by ${APP_EXEC}" >&2
            exit 1
          fi

          echo "Bundling private dylibs:"
          printf '  %s\n' "${PRIVATE_DYLIBS[@]}"

          ensure_rpath() {
            local file="$1"
            local rpath="$2"
            if ! otool -l "${file}" | awk '
              $1 == "cmd" && $2 == "LC_RPATH" { in_rpath=1; next }
              in_rpath && $1 == "path" { print $2; in_rpath=0 }
            ' | grep -Fxq "${rpath}"; then
              install_name_tool -add_rpath "${rpath}" "${file}"
            fi
          }

          rewrite_private_refs() {
            local file="$1"
            while read -r dep; do
              [ -n "${dep}" ] || continue
              local base
              base="$(basename "${dep}")"
              if [[ " ${PRIVATE_DYLIBS[*]} " == *" ${base} "* ]]; then
                install_name_tool -change "${dep}" "@rpath/${base}" "${file}"
              fi
            done < <(otool -L "${file}" | tail -n +2 | awk '{print $1}')
          }

          ensure_rpath "${APP_EXEC}" "@executable_path/../Frameworks"

          for dylib in "${PRIVATE_DYLIBS[@]}"; do
            src="dist/bin/${dylib}"
            dst="${FRAMEWORKS_DIR}/${dylib}"
            cp -f "${src}" "${dst}"
            chmod u+w "${dst}"
            install_name_tool -id "@rpath/${dylib}" "${dst}"
            ensure_rpath "${dst}" "@loader_path"
          done

          rewrite_private_refs "${APP_EXEC}"
          for dylib in "${PRIVATE_DYLIBS[@]}"; do
            rewrite_private_refs "${FRAMEWORKS_DIR}/${dylib}"
            rm -f "dist/bin/${dylib}"
          done

          for plugin in dist/bin/*.dylib; do
            [ -f "${plugin}" ] || continue
            base="$(basename "${plugin}")"
            dst="${APP_PLUGINS_DIR}/${base}"
            mv "${plugin}" "${dst}"
            chmod u+w "${dst}"
            ensure_rpath "${dst}" "@loader_path/../../Frameworks"
            rewrite_private_refs "${dst}"
          done

          for data_dir in examples help resources; do
            if [ -d "dist/${data_dir}" ]; then
              rm -rf "${APP_RESOURCES_DIR}/${data_dir}"
              mv "dist/${data_dir}" "${APP_RESOURCES_DIR}/${data_dir}"
            fi
          done

          if [ -d dist/bin ] && [ -z "$(find dist/bin -mindepth 1 -print -quit)" ]; then
            rmdir dist/bin
          fi

      - name: Validate macOS app-bundle artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          APP_BUNDLE_COUNT="$(find dist -mindepth 1 -maxdepth 1 -type d -name '*.app' | wc -l | tr -d ' ')"
          if [ "${APP_BUNDLE_COUNT}" -ne 1 ]; then
            echo "Expected exactly one top-level .app bundle in dist/, found ${APP_BUNDLE_COUNT}." >&2
            find dist -mindepth 1 -maxdepth 1 -print >&2
            exit 1
          fi

          APP_BUNDLE_PATH="$(find dist -mindepth 1 -maxdepth 1 -type d -name '*.app' -print | head -n 1)"
          TOP_LEVEL_COUNT="$(find dist -mindepth 1 -maxdepth 1 | wc -l | tr -d ' ')"

          if [ "${TOP_LEVEL_COUNT}" -ne 1 ]; then
            echo "macOS artifact must contain only the app bundle at the top level." >&2
            echo "Found top-level entries:" >&2
            find dist -mindepth 1 -maxdepth 1 -print | sort >&2
            exit 1
          fi

          echo "Validated macOS artifact: ${APP_BUNDLE_PATH}"

      - name: Pack
        shell: bash
        run: |
          asset="tonatiuhpp-${{ runner.os }}.tar.gz"
          tar -czf "${asset}" -C dist .
          python - "${asset}" <<'PY'
          import hashlib
          import pathlib
          import sys

          asset = pathlib.Path(sys.argv[1])
          digest = hashlib.sha256()
          with asset.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)
          asset.with_name(asset.name + ".sha256").write_text(f"{digest.hexdigest()}  {asset.name}\n", encoding="ascii")
          PY

      - name: Generate IFW repository
        shell: bash
        run: |
          set -euo pipefail

          python installer/create_ifw_repository.py \
            --repogen "${REPOGEN_PATH}" \
            --package-data-dir dist \
            --repository-dir "installer/repositories/${{ matrix.ifw_platform }}" \
            --platform "${{ matrix.ifw_platform }}"

      - name: Upload IFW repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: ifw-repository-${{ matrix.ifw_platform }}
          path: installer/repositories/${{ matrix.ifw_platform }}/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ runner.os }}
          path: |
            tonatiuhpp-${{ runner.os }}.tar.gz
            tonatiuhpp-${{ runner.os }}.tar.gz.sha256

  build-windows-installer:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: lukka/get-cmake@latest

      - name: Install Qt + Qt IFW
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.1"
          arch: "win64_msvc2022_64"
          tools: "tools_ifw"
          cache: true

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve Qt tool paths
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $qtRoot = $env:QT_ROOT_DIR
          if (-not $qtRoot -and $env:Qt6_DIR) {
            $qtRoot = [System.IO.Path]::GetFullPath((Join-Path $env:Qt6_DIR "..\..\.."))
          }

          if (-not $qtRoot) {
            throw "Neither QT_ROOT_DIR nor Qt6_DIR is set after install-qt-action."
          }

          $windeployqt = (Get-Command windeployqt -ErrorAction Stop).Source
          $binarycreator = (Get-Command binarycreator -ErrorAction Stop).Source
          $repogen = (Get-Command repogen -ErrorAction Stop).Source

          "TONATIUH_QT_ROOT=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Qt6_DIR=$qtRoot\lib\cmake\Qt6" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDEPLOYQT_PATH=$windeployqt" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BINARYCREATOR_PATH=$binarycreator" | Out-File -FilePath $env:GITHUB_ENV -Append
          "REPOGEN_PATH=$repogen" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Resolve project version
        id: project_version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.fake_tag }}"
          }

          $version = py installer/sync_ifw_metadata.py --check-tag "$tag" --print-version
          "TONATIUHPP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install Python deps (+ Ninja)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml ninja

      - name: Install Boost + Eigen headers (Windows, download)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $boostVersion = "1.90.0"
          $boostU = "1_90_0"
          $boostRoot = "C:\boost_$boostU"
          $boostZip = "$env:RUNNER_TEMP\boost_$boostU.zip"
          $boostUrlPrimary = "https://boostorg.jfrog.io/artifactory/main/release/$boostVersion/source/boost_$boostU.zip"
          $boostUrlFallback = "https://archives.boost.io/release/$boostVersion/source/boost_$boostU.zip"

          if (Test-Path $boostRoot) { Remove-Item -Recurse -Force $boostRoot }
          if (Test-Path $boostZip) { Remove-Item -Force $boostZip }

          function Download-File($url, $outFile) {
            Write-Host "Downloading: $url"
            Invoke-WebRequest -Uri $url -OutFile $outFile -MaximumRedirection 10 -TimeoutSec 600
            if (!(Test-Path $outFile)) { throw "Download failed: $url (no output file)" }

            $fs = [System.IO.File]::OpenRead($outFile)
            try {
              $b1 = $fs.ReadByte()
              $b2 = $fs.ReadByte()
              if ($b1 -ne 0x50 -or $b2 -ne 0x4B) {
                throw "Downloaded file is not a ZIP (bad signature). URL may have returned HTML."
              }
            } finally {
              $fs.Dispose()
            }
          }

          try {
            Download-File $boostUrlPrimary $boostZip
          } catch {
            Write-Host "Primary Boost URL failed: $($_.Exception.Message)"
            Download-File $boostUrlFallback $boostZip
          }

          Expand-Archive -Path $boostZip -DestinationPath "C:\" -Force

          if (!(Test-Path (Join-Path $boostRoot "boost\version.hpp"))) {
            throw "Boost headers missing: expected $(Join-Path $boostRoot 'boost\version.hpp')"
          }

          "TONATIUH_BOOST_ROOT=$boostRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

          $eigenVersion = "5.0.0"
          $eigenRoot = "C:\eigen-$eigenVersion"
          $eigenZip = "$env:RUNNER_TEMP\eigen-$eigenVersion.zip"
          $eigenUrl = "https://gitlab.com/libeigen/eigen/-/archive/$eigenVersion/eigen-$eigenVersion.zip"

          if (Test-Path $eigenRoot) { Remove-Item -Recurse -Force $eigenRoot }
          New-Item -ItemType Directory -Path $eigenRoot | Out-Null

          Invoke-WebRequest -Uri $eigenUrl -OutFile $eigenZip -MaximumRedirection 10 -TimeoutSec 600

          $eigenExtract = Join-Path $env:RUNNER_TEMP "eigen_extract_$eigenVersion"
          if (Test-Path $eigenExtract) { Remove-Item -Recurse -Force $eigenExtract }
          Expand-Archive -Path $eigenZip -DestinationPath $eigenExtract -Force

          $eigenInner = Get-ChildItem -Path $eigenExtract -Directory -Recurse |
            Where-Object { Test-Path (Join-Path $_.FullName "Eigen\Core") } |
            Select-Object -First 1

          if (-not $eigenInner) {
            throw "Eigen headers missing: could not locate Eigen\Core anywhere under $eigenExtract"
          }

          Copy-Item -Path (Join-Path $eigenInner.FullName "*") -Destination $eigenRoot -Recurse -Force

          if (!(Test-Path (Join-Path $eigenRoot "Eigen\Core"))) {
            throw "Eigen headers missing after copy: expected $(Join-Path $eigenRoot 'Eigen\Core')"
          }

          "TONATIUH_EIGEN_ROOT=$eigenRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache third-party deps
        uses: actions/cache@v4
        with:
          path: |
            third_party/_install
            third_party/_build
          key: release-deps-windows-${{ hashFiles(
            'scripts/build_deps.py',
            'third_party/deps.yaml',
            'cmake/**',
            'source/CMakeLists.txt',
            '.github/workflows/release.yml') }}

      - name: Build third-party dependencies
        shell: bash
        run: |
          mkdir -p third_party/_build third_party/_install
          python scripts/build_deps.py

      - name: Configure Tonatiuh++
        shell: pwsh
        run: |
          cmake -S source -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Tonatiuh++ Release
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Stage Qt IFW payload
        shell: pwsh
        run: |
          py installer/prepare_ifw_payload.py --build-dir build --config Release --skip-build --windeployqt "$env:WINDEPLOYQT_PATH"

      - name: Generate Windows IFW repository
        shell: pwsh
        run: |
          py installer/create_ifw_repository.py --repogen "$env:REPOGEN_PATH" --repository-dir "installer/repositories/windows" --platform windows

      - name: Generate Windows installer
        shell: pwsh
        run: |
          py installer/create_installer.py --binarycreator "$env:BINARYCREATOR_PATH" --repository-platform windows --output-name "TonatiuhPP-$env:TONATIUHPP_VERSION-windows-x64"

      - name: Generate Windows installer checksum
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $asset = "installer/output/TonatiuhPP-$env:TONATIUHPP_VERSION-windows-x64.exe"
          $hash = (Get-FileHash -Algorithm SHA256 -Path $asset).Hash.ToLowerInvariant()
          $assetName = [System.IO.Path]::GetFileName($asset)
          [System.IO.File]::WriteAllText("$asset.sha256", "$hash  $assetName`n", [System.Text.Encoding]::ASCII)

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-windows
          path: |
            installer/output/TonatiuhPP-${{ steps.project_version.outputs.version }}-windows-x64.exe
            installer/output/TonatiuhPP-${{ steps.project_version.outputs.version }}-windows-x64.exe.sha256

      - name: Upload Windows IFW repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: ifw-repository-windows
          path: installer/repositories/windows/

  publish:
    if: github.event_name != 'workflow_dispatch'
    needs:
      - build-and-package
      - build-windows-installer
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: assets
          pattern: asset-*

      - name: Download IFW repositories
        uses: actions/download-artifact@v4
        with:
          path: ifw-repositories
          pattern: ifw-repository-*

      - name: Prepare GitHub Pages IFW content
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p pages/ifw

          for artifact in ifw-repositories/ifw-repository-*; do
            [ -d "${artifact}" ] || continue
            platform="${artifact##*/ifw-repository-}"
            mkdir -p "pages/ifw/${platform}"
            cp -a "${artifact}/." "pages/ifw/${platform}/"
            test -f "pages/ifw/${platform}/Updates.xml"
          done

          test -f pages/ifw/windows/Updates.xml
          test -f pages/ifw/linux/Updates.xml
          test -f pages/ifw/macos/Updates.xml

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: assets/**/*
